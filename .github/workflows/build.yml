name: OpenWrt Cudy WR3000 Minimal

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses-dev libssl-dev python3 unzip wget rsync

      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt.git
          cd openwrt
          git checkout v24.10.5

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate config
        run: |
          cd openwrt

          cat > .config <<'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_cudy_wr3000-v1=y

          #### LuCI ####
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y

          #### Sing-box ####
          CONFIG_PACKAGE_sing-box=y
          CONFIG_PACKAGE_kmod-tun=y

          #### Certificates ####
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_ca-certificates=y

          #### Tools ####
          CONFIG_PACKAGE_ip-full=y

          #################################################
          ## Remove unnecessary packages
          #################################################

          # IPv6
          CONFIG_PACKAGE_odhcp6c=n
          CONFIG_PACKAGE_odhcpd-ipv6only=n
          CONFIG_PACKAGE_dnsmasq_full_dhcpv6=n
          CONFIG_PACKAGE_kmod-ipv6=n

          # PPP
          CONFIG_PACKAGE_ppp=n
          CONFIG_PACKAGE_ppp-mod-pppoe=n
          CONFIG_PACKAGE_ppp-mod-pppol2tp=n
          CONFIG_PACKAGE_ppp-mod-pptp=n

          # USB
          CONFIG_PACKAGE_kmod-usb-core=n
          CONFIG_PACKAGE_kmod-usb2=n
          CONFIG_PACKAGE_kmod-usb3=n
          CONFIG_PACKAGE_kmod-usb-xhci-hcd=n
          CONFIG_PACKAGE_kmod-usb-ohci=n
          CONFIG_PACKAGE_kmod-usb-ehci=n

          # Printing
          CONFIG_PACKAGE_p910nd=n

          # Storage
          CONFIG_PACKAGE_block-mount=n
          CONFIG_PACKAGE_kmod-fs-ext4=n
          CONFIG_PACKAGE_kmod-fs-vfat=n
          CONFIG_PACKAGE_kmod-nls-cp437=n
          CONFIG_PACKAGE_kmod-nls-iso8859-1=n
          CONFIG_PACKAGE_kmod-usb-storage=n

          # Filesystems
          CONFIG_PACKAGE_kmod-fs-f2fs=n
          CONFIG_PACKAGE_kmod-fs-btrfs=n
          CONFIG_PACKAGE_kmod-fs-xfs=n

          # Bluetooth
          CONFIG_PACKAGE_bluetoothd=n

          # HomeProxy
          CONFIG_PACKAGE_luci-app-homeproxy=n

          # Adblock
          CONFIG_PACKAGE_adblock-fast=n

          EOF

          make defconfig

      - name: Download sources
        run: |
          cd openwrt
          make download -j8

      - name: Build
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-Cudy-WR3000
          path: openwrt/bin/targets/**
